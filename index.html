<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Spiele-Archiv</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212;
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 2px solid #333;
            border-radius: 15px;
            background: #1e1e1e;
        }
        h1 { color: #00ff88; }
        .play-button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: #00ff88;
            color: #121212;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        .play-button:hover {
            transform: scale(1.05);
            background-color: #00cc6e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Willkommen im Archiv</h1>
        <p>Klicke auf den Button, um das Spiel zu starten:</p>
        
        <a href="pong.html" class="play-button">Pong Spiel starten</a>
    </div>

</body>
</html>
